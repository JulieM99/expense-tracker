version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: identity-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: identity_db
    ports:
      - "3306:3306"

  identity-service:
    build: ./identity-service
    container_name: identity-service
    ports:
      - "8081:8080"
    depends_on:
      - mysql